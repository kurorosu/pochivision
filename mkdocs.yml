site_name: "Pochivision"
site_description: "プラグイン方式でプロセッサを拡張可能な AI ビジョン向けリアルタイム画像キャプチャ・前処理エンジン"
site_url: "https://kurorosu.github.io/pochivision/"
repo_url: "https://github.com/kurorosu/pochivision"
repo_name: "kurorosu/pochivision"

docs_dir: docs

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ライトモードに切り替え

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            docstring_style: google
            members_order: source
            separate_signature: true

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.details

nav:
  - ホーム: index.md
  - はじめに:
      - インストール: getting-started/installation.md
      - クイックスタート: getting-started/quickstart.md
  - ユーザーガイド:
      - ライブプレビュー (pochi run): user-guide/run.md
      - 特徴量抽出 (pochi extract): user-guide/extract.md
      - プロファイル適用 (pochi process): user-guide/process.md
      - 画像集約 (pochi aggregate): user-guide/aggregate.md
      - FFT ビジュアライザー (pochi fft): user-guide/fft.md
      - 検出モード (--detect): user-guide/detection.md
      - 推論モード: user-guide/inference.md
      - 設定ファイル: user-guide/configuration.md
      - 利用可能なプロセッサ: user-guide/processors.md
      - 利用可能な Feature Extractor: user-guide/feature-extractors.md
      - 特徴量リファレンス:
          - FFT: user-guide/features/fft.md
          - GLCM: user-guide/features/glcm.md
          - HLAC: user-guide/features/hlac.md
          - LBP: user-guide/features/lbp.md
          - SWT: user-guide/features/swt.md
